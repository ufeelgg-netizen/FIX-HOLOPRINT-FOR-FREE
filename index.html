<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>FIX HOLOPRINT · الإصدار المحترف</title>
    <!-- أيقونة الموقع الجديدة -->
    <link rel="icon" type="image/png" href="https://image2url.com/r2/default/images/1773163753711-12a6b929-9d7b-412f-bfde-a12c7d98698d.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: #0F172A;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 12px;
            margin: 0;
            direction: rtl;
            position: relative;
            overflow-x: hidden;
        }
        /* خلفية بنقاط متحركة */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(circle at 30% 40%, rgba(56, 189, 248, 0.1) 0%, transparent 30%),
                              radial-gradient(circle at 70% 80%, rgba(37, 99, 235, 0.1) 0%, transparent 30%),
                              repeating-linear-gradient(45deg, rgba(255,255,255,0.02) 0px, rgba(255,255,255,0.02) 2px, transparent 2px, transparent 8px);
            pointer-events: none;
            z-index: 0;
        }
        .container {
            width: 100%;
            max-width: 560px;
            margin: 15px auto;
            position: relative;
            z-index: 1;
        }
        .card {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(12px);
            border: 1px solid #2563EB;
            border-radius: 45px;
            padding: 24px 20px;
            margin-bottom: 20px;
            box-shadow: 0 25px 45px -10px rgba(37, 99, 235, 0.4),
                        0 0 0 1px rgba(56, 189, 248, 0.2) inset;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 30px 55px -8px #2563EB, 0 0 0 2px #38BDF8 inset;
        }
        .header {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 15px;
        }
        .logo h1 {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #2563EB, #38BDF8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .lock-icon { font-size: 2rem; text-align: center; margin-bottom: 10px; }
        .code-input {
            width: 100%;
            background: #1E293B;
            border: 2px solid #2563EB;
            padding: 18px 20px;
            border-radius: 60px;
            font-size: 1.2rem;
            color: white;
            text-align: center;
            letter-spacing: 3px;
            outline: none;
            margin: 15px 0;
        }
        .code-input::placeholder { color: #94A3B8; letter-spacing: normal; }
        .btn-primary {
            width: 100%;
            background: #2563EB;
            border: none;
            color: white;
            font-weight: bold;
            padding: 18px 20px;
            border-radius: 60px;
            font-size: 1.3rem;
            cursor: pointer;
            border-bottom: 4px solid #1e4bb3;
            box-shadow: 0 8px 15px rgba(37, 99, 235, 0.5);
            margin: 10px 0;
            transition: all 0.2s;
        }
        .btn-primary:hover:not(:disabled) {
            background: #1e4bb3;
            transform: translateY(-2px);
        }
        .btn-primary:active:not(:disabled) { transform: translateY(2px); border-bottom-width: 2px; }
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            background: #475569;
            border-bottom-color: #1E293B;
        }
        .file-area {
            background: #1E293B;
            border-radius: 30px;
            padding: 18px;
            border: 2px dashed #2563EB;
            margin: 15px 0;
            text-align: center;
        }
        .file-label {
            background: #2563EB;
            padding: 16px 25px;
            border-radius: 50px;
            color: white;
            font-weight: 600;
            display: inline-block;
            cursor: pointer;
            border: 1px solid #38BDF8;
            width: 100%;
            transition: 0.2s;
        }
        .file-label:hover {
            background: #1e4bb3;
        }
        .badge {
            background: #1E293B;
            color: #E5E7EB;
            padding: 12px 16px;
            border-radius: 50px;
            font-size: 1rem;
            margin: 10px 0;
            word-break: break-word;
            border: 1px solid #38BDF8;
        }
        .message {
            background: #1E293B;
            padding: 18px;
            border-radius: 30px;
            margin-top: 15px;
            color: #E5E7EB;
            border: 1px solid #2563EB;
            white-space: pre-line;
        }
        .discord-link {
            display: block;
            background: #5865F2;
            padding: 16px 20px;
            border-radius: 60px;
            color: white;
            font-weight: bold;
            text-decoration: none;
            text-align: center;
            font-size: 1.2rem;
            margin: 15px 0;
        }
        footer { text-align: center; color: #94A3B8; margin-top: 15px; }
        
        .permanent-lock {
            text-align: center;
            padding: 30px;
            background: #1E293B;
            border-radius: 40px;
            border: 2px solid #2563EB;
        }
        .permanent-lock h2 { color: #38BDF8; font-size: 2rem; margin-bottom: 20px; }
        .permanent-lock p { color: #E5E7EB; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <div class="logo">
                    <h1>🔧 FIX HOLOPRINT</h1>
                </div>
            </div>

            <div id="lockScreen">
                <div class="lock-icon">🔒</div>
                <input type="text" id="codeInput" class="code-input" placeholder="أدخل كود الفتح" maxlength="20">
                <button class="btn-primary" id="unlockBtn">فتح القفل</button>
                <div id="unlockMessage" class="message" style="display: none;"></div>
            </div>

            <div id="permanentLockScreen" style="display: none;">
                <div class="permanent-lock">
                    <h2>🔒 كود غير صحيح</h2>
                    <p>الكود الذي أدخلته غير موجود</p>
                    <p>يرجى التأكد والمحاولة مرة أخرى</p>
                    <div style="margin-top: 30px; font-size: 3rem;">🚫</div>
                </div>
            </div>

            <div id="processScreen" style="display: none;">
                <div class="file-area">
                    <input type="file" id="packFile" accept=".mcpack,.zip" style="display: none;">
                    <button class="file-label" onclick="document.getElementById('packFile').click()">📦 اختيار ملف .mcpack أو .zip</button>
                    <div id="fileName" class="badge">لم يتم اختيار ملف</div>
                </div>
                <button class="btn-primary" id="processBtn" disabled>🔧 معالجة وإصلاح الملف</button>
                <div id="processMessage" class="message"></div>
            </div>

            <a href="https://discord.gg/cqQvSshdt" target="_blank" class="discord-link">💬 دعم فني عبر Discord</a>
            <footer>تم التطوير بواسطة @hurleyxyz · الإصدار 5.0</footer>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script>
        // ==================== الأكواد الثابتة (قابلة للتعديل يدوياً) ====================
        const CODES_LIST = [
            {
                "code": "Hhh",
                "type": "unlimited",
                "usesLeft": null,
                "active": true,
                "deviceBound": null
            },
            {
                "code": "TEST-123",
                "type": "limited",
                "usesLeft": 3,
                "active": true,
                "deviceBound": null
            },
            {
                "code": "VIP-2025",
                "type": "limited",
                "usesLeft": 1,
                "active": true,
                "deviceBound": null
            }
        ];

        // مفاتيح التخزين المحلي
        const STORAGE_KEY = 'holoprint_device_id';
        const USAGE_KEY_PREFIX = 'code_usage_';  // لكل كود، سنخزن عدد الاستخدامات المتبقية
        const LOCKED_KEY = 'holoprint_permanent_lock'; // قفل شامل (إذا انتهى كود محدود نهائياً)

        function getDeviceId() {
            let deviceId = localStorage.getItem(STORAGE_KEY);
            if (!deviceId) {
                deviceId = 'dev_' + Math.random().toString(36).substring(2) + Date.now().toString(36);
                localStorage.setItem(STORAGE_KEY, deviceId);
            }
            return deviceId;
        }

        // تحميل حالة الاستخدامات من localStorage (لكل كود على حدة)
        function loadUsageForCode(codeObj) {
            if (codeObj.type !== 'limited') return null; // غير محدود لا يحتاج تخزين
            const key = USAGE_KEY_PREFIX + codeObj.code;
            const stored = localStorage.getItem(key);
            if (stored !== null) {
                return parseInt(stored, 10);
            } else {
                // أول مرة: نستخدم usesLeft الأصلي
                return codeObj.usesLeft;
            }
        }

        // حفظ الاستخدامات المتبقية لكود محدود
        function saveUsageForCode(codeObj, remainingUses) {
            if (codeObj.type !== 'limited') return;
            const key = USAGE_KEY_PREFIX + codeObj.code;
            localStorage.setItem(key, remainingUses.toString());
        }

        // دالة التحقق من الكود (تأخذ الكود المدخل وتعيد النتيجة)
        function validateCode(inputCode) {
            // التحقق من القفل الدائم (إذا كان هناك كود محدود انتهى نهائياً)
            if (localStorage.getItem(LOCKED_KEY) === 'true') {
                return { success: false, message: '🔒 هذا الكود استخدم وانتهى نهائياً', permanentLock: true };
            }

            const normalizedInput = inputCode.trim().toUpperCase();
            const deviceId = getDeviceId();

            // البحث عن الكود في القائمة الثابتة
            const found = CODES_LIST.find(c => c.code.toUpperCase() === normalizedInput && c.active === true);
            if (!found) {
                return { success: false, message: '❌ كود غير صالح أو معطل' };
            }

            // إذا كان الكود مرتبط بجهاز معين
            if (found.deviceBound && found.deviceBound !== deviceId) {
                return { success: false, message: '⚠️ هذا الكود مقيد بجهاز آخر' };
            }

            // إذا كان الكود من نوع limited، نتحقق من الاستخدامات المتبقية
            if (found.type === 'limited') {
                const remaining = loadUsageForCode(found);
                if (remaining <= 0) {
                    return { success: false, message: '❌ انتهت استخدامات هذا الكود' };
                }
                // ربط الجهاز إذا لم يكن مرتبطاً
                if (!found.deviceBound) {
                    found.deviceBound = deviceId;
                }
                // نمرر الكائن مع الاستخدامات الحالية
                return { success: true, codeObject: found, remainingUses: remaining, message: '✅ تم الفتح بنجاح' };
            } else {
                // unlimited
                if (!found.deviceBound) {
                    found.deviceBound = deviceId;
                }
                return { success: true, codeObject: found, remainingUses: null, message: '✅ تم الفتح بنجاح' };
            }
        }

        // استهلاك استخدام (للمحدود)
        function consumeUse(codeObj) {
            if (codeObj.type !== 'limited') return false; // غير محدود لا يستهلك
            const currentRemaining = loadUsageForCode(codeObj);
            if (currentRemaining > 0) {
                const newRemaining = currentRemaining - 1;
                saveUsageForCode(codeObj, newRemaining);
                if (newRemaining === 0) {
                    localStorage.setItem(LOCKED_KEY, 'true'); // قفل دائم لهذا الجهاز
                    return true; // كان آخر استخدام
                }
            }
            return false;
        }

        function generateFixIconBase64() {
            return new Promise((resolve) => {
                const canvas = document.createElement('canvas');
                canvas.width = 256;
                canvas.height = 256;
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, 256, 256);
                ctx.fillStyle = '#0F172A';
                ctx.beginPath();
                ctx.arc(128, 128, 120, 0, 2 * Math.PI);
                ctx.fill();
                ctx.strokeStyle = '#38BDF8';
                ctx.lineWidth = 8;
                ctx.stroke();
                ctx.font = 'bold 80px "Segoe UI", "Tahoma", sans-serif';
                ctx.fillStyle = '#FFFFFF';
                ctx.shadowColor = '#2563EB';
                ctx.shadowBlur = 15;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('FIX', 128, 128);
                ctx.shadowBlur = 0;
                ctx.font = '20px "Segoe UI"';
                ctx.fillStyle = '#E5E7EB';
                ctx.fillText('holoprint', 128, 200);
                const base64 = canvas.toDataURL('image/png').split(',')[1];
                resolve(base64);
            });
        }

        let currentCodeObject = null;
        let currentRemainingUses = null;

        window.addEventListener('load', function() {
            if (localStorage.getItem(LOCKED_KEY) === 'true') {
                document.getElementById('lockScreen').style.display = 'none';
                document.getElementById('permanentLockScreen').style.display = 'block';
                document.querySelector('.permanent-lock h2').innerText = '🔒 مغلق نهائياً';
                document.querySelector('.permanent-lock p').innerHTML = 'هذا الكود استخدم وانتهى<br>لا يمكن استخدامه مرة أخرى';
            }
        });

        document.getElementById('unlockBtn').addEventListener('click', function() {
            const code = document.getElementById('codeInput').value;
            const result = validateCode(code);
            const msgDiv = document.getElementById('unlockMessage');
            msgDiv.style.display = 'block';
            msgDiv.innerText = result.message;

            if (result.success) {
                currentCodeObject = result.codeObject;
                currentRemainingUses = result.remainingUses;
                document.getElementById('lockScreen').style.display = 'none';
                document.getElementById('processScreen').style.display = 'block';
            } else if (result.permanentLock) {
                document.getElementById('lockScreen').style.display = 'none';
                document.getElementById('permanentLockScreen').style.display = 'block';
                document.querySelector('.permanent-lock h2').innerText = '🔒 مغلق نهائياً';
                document.querySelector('.permanent-lock p').innerHTML = 'هذا الكود استخدم وانتهى<br>لا يمكن استخدامه مرة أخرى';
            } else {
                // كود غير صحيح: نعرض رسالة الخطأ مؤقتاً ثم نعود
                document.getElementById('lockScreen').style.display = 'none';
                document.getElementById('permanentLockScreen').style.display = 'block';
                document.querySelector('.permanent-lock h2').innerText = '❌ كود خاطئ';
                document.querySelector('.permanent-lock p').innerHTML = 'الكود الذي أدخلته غير صحيح<br>سيتم إعادة التوجيه بعد 3 ثوانٍ';
                setTimeout(() => {
                    document.getElementById('permanentLockScreen').style.display = 'none';
                    document.getElementById('lockScreen').style.display = 'block';
                    document.getElementById('codeInput').value = '';
                    msgDiv.style.display = 'none';
                }, 3000);
            }
        });

        // ==================== معالجة الملف ====================
        const packFile = document.getElementById('packFile');
        const fileNameSpan = document.getElementById('fileName');
        const processBtn = document.getElementById('processBtn');
        const processMessage = document.getElementById('processMessage');

        let selectedFile = null;

        packFile.addEventListener('change', function(e) {
            if (e.target.files[0]) {
                selectedFile = e.target.files[0];
                fileNameSpan.innerText = `📁 ${selectedFile.name}`;
                processBtn.disabled = false;
            } else {
                selectedFile = null;
                fileNameSpan.innerText = 'لم يتم اختيار ملف';
                processBtn.disabled = true;
            }
        });

        function handleDownload(resultBlob, resultName) {
            if (!resultBlob) return;
            var fixedBlob = new Blob([resultBlob], { type: "application/octet-stream" });
            var url = URL.createObjectURL(fixedBlob);
            var a = document.createElement("a");
            a.href = url;
            var filename = resultName;
            if (filename.endsWith(".mcpack.zip")) {
                filename = filename.replace(".mcpack.zip", ".mcpack");
            }
            if (!filename.endsWith(".mcpack")) {
                filename = filename.replace(/\.(zip)$/i, ".mcpack");
            }
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        processBtn.addEventListener('click', async function() {
            if (!currentCodeObject) {
                alert('الرجاء فتح القفل أولاً');
                return;
            }
            if (!selectedFile) {
                processMessage.innerText = '❌ لم تختر ملف';
                return;
            }
            processMessage.innerText = '⏳ جاري المعالجة...';

            try {
                const JSZip = window.JSZip;
                const zip = new JSZip();
                const content = await selectedFile.arrayBuffer();
                const zipData = await zip.loadAsync(content);

                let changesMade = [];

                // تعديل armor_stand.entity.json
                let modified = false;
                for (let filename in zipData.files) {
                    if (filename.includes('armor_stand.entity.json')) {
                        const file = zipData.files[filename];
                        let text = await file.async('string');
                        const originalText = text;

                        text = text.replace(/"default":"armor_stand"/g, '"default":"leash_knot"');
                        text = text.replace(/"identifier":"minecraft:armor_stand"/g, '"identifier":"minecraft:leash_knot"');

                        if (text !== originalText) {
                            zipData.file(filename, text);
                            modified = true;
                            changesMade.push('✅ تم تعديل armor_stand.entity.json');
                        }
                    }
                }

                if (!modified) {
                    changesMade.push('⚠️ لم يتم العثور على ملف armor_stand.entity.json داخل الحزمة');
                }

                // تعديل manifest.json
                for (let filename in zipData.files) {
                    if (filename.includes('manifest.json')) {
                        const file = zipData.files[filename];
                        let manifestContent = await file.async('string');
                        const originalManifest = manifestContent;
                        manifestContent = manifestContent.replace(
                            /("name"\s*:\s*")(.*?)(")/g,
                            function(match, prefix, name, suffix) {
                                if (name.includes('Kelp Farm (1)') && !name.includes('§4§l(fixed)')) {
                                    return prefix + name + ' §4§l(fixed)' + suffix;
                                }
                                return match;
                            }
                        );
                        if (manifestContent !== originalManifest) {
                            zipData.file(filename, manifestContent);
                            changesMade.push('✅ تم تعديل manifest.json');
                        }
                        break;
                    }
                }

                // استبدال الصورة بصورة FIX
                processMessage.innerText = '⏳ جاري إنشاء صورة FIX...';
                const iconBase64 = await generateFixIconBase64();
                if (iconBase64) {
                    for (let filename in zipData.files) {
                        if (filename.includes('pack_icon.png') || filename.includes('Icon.jpg') || filename.includes('icon.png')) {
                            zipData.remove(filename);
                        }
                    }
                    const iconData = atob(iconBase64);
                    const iconArray = new Uint8Array(iconData.length);
                    for (let i = 0; i < iconData.length; i++) {
                        iconArray[i] = iconData.charCodeAt(i);
                    }
                    zipData.file('pack_icon.png', iconArray);
                    changesMade.push('✅ تم استبدال صورة الحزمة');
                }

                // إنشاء الملف الجديد
                const newZip = await zipData.generateAsync({ type: 'blob' });
                const originalName = selectedFile.name;
                const baseName = originalName.replace(/\.mcpack$|\.zip$/i, '');
                let newName = `${baseName}_fixed.mcpack`;

                handleDownload(newZip, newName);

                // استهلاك استخدام للكود إذا كان محدوداً
                const wasLastUse = consumeUse(currentCodeObject);

                let resultMessage = changesMade.join('\n') + '\n\n';
                if (wasLastUse) {
                    resultMessage += '✅ تمت المعالجة! هذا كان آخر استخدام للكود. سيتم إغلاق الموقع.';
                    processMessage.innerText = resultMessage;
                    setTimeout(() => {
                        document.getElementById('processScreen').style.display = 'none';
                        document.getElementById('permanentLockScreen').style.display = 'block';
                        document.querySelector('.permanent-lock h2').innerText = '🔒 مغلق نهائياً';
                        document.querySelector('.permanent-lock p').innerHTML = 'هذا الكود استخدم وانتهى<br>لا يمكن استخدامه مرة أخرى';
                    }, 5000);
                } else {
                    resultMessage += '✅ تمت المعالجة بنجاح! تم تحميل الملف المعدل.';
                    processMessage.innerText = resultMessage;
                }

            } catch (err) {
                console.error('خطأ في المعالجة:', err);
                processMessage.innerText = `❌ خطأ: ${err.message}\n\nتفاصيل إضافية في وحدة التحكم (F12 > Console)`;
            }
        });
    </script>
</body>
</html>
