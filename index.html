    <style>
        * {

        .card {

<body>
    <div class="container">
        <div class="card">

                    <input type="file" id="packFile" accept=".mcpack,.zip" style="display: none;">
                    <button class="file-label" onclick="document.getElementById('packFile').click()">📦 اختيار ملف .mcpack أو .zip</button>
                    <div id="fileName" class="badge">لم يتم اختيار ملف</div>
                </div>

    <div id="adminPanel" class="admin-panel">
        <div class="admin-content">
            <div class="admin-header">
                <h2 style="color: #38BDF8;">👑 إدارة الأجهزة</h2>
                <button class="btn-close" onclick="closeAdmin()">×</button>
            </div>
            <div id="adminLogin">
                <input type="password" id="adminPass" class="input-admin" placeholder="كلمة المرور">
                <button class="btn-primary" onclick="checkAdminPass()">دخول</button>
            </div>
            <div id="adminContent" style="display: none;">
                <input type="text" id="searchInput" class="search-box" placeholder="🔍 بحث برقم الجهاز..." onkeyup="filterDevices()">
                <div style="margin: 20px 0;">
                    <h3 style="color: #38BDF8; margin-bottom: 15px;">📱 الأجهزة المسجلة</h3>
                    <div id="devicesList"></div>

            </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script>
        // ==================== إدارة الأجهزة (معرف 8 أرقام عشوائي ورصيد = 0 للمستخدم الجديد) ====================
        const DEVICES_KEY = 'holoprint_devices_v2';
        const ADMIN_PASSWORD = '3alloch';

        // توليد معرف 8 أرقام عشوائي
        function generateDeviceId() {
            return Math.floor(10000000 + Math.random() * 90000000).toString();
        }

        // الحصول على معرف الجهاز (يُخزن في localStorage)
        function getDeviceId() {
            let deviceId = localStorage.getItem('holoprint_device_id_v2');
            if (!deviceId) {
                deviceId = generateDeviceId();
                localStorage.setItem('holoprint_device_id_v2', deviceId);
                // تسجيل الجهاز الجديد (برصيد 0)
                registerNewDevice(deviceId, 0);
            }
            return deviceId;
        }

        // هيكل الجهاز: { id, remainingUses (number or null for unlimited), lastSeen, blocked }
        function loadDevices() {
            const stored = localStorage.getItem(DEVICES_KEY);
            if (stored) {
                try { return JSON.parse(stored); } catch { return {}; }
            }
            return {};
        }

        function saveDevices(devices) {
            localStorage.setItem(DEVICES_KEY, JSON.stringify(devices));
        }

        // تسجيل جهاز جديد برصيد محدد (افتراضي 0)
        function registerNewDevice(deviceId, initialUses = 0) {
            const devices = loadDevices();
            if (!devices[deviceId]) {
                devices[deviceId] = {
                    id: deviceId,
                    remainingUses: initialUses,
                    lastSeen: new Date().toISOString(),
                    blocked: false
                };
                saveDevices(devices);
            }
            return devices[deviceId];
        }

        // تحديث آخر ظهور
        function updateDeviceLastSeen(deviceId) {
            const devices = loadDevices();
            if (devices[deviceId]) {
                devices[deviceId].lastSeen = new Date().toISOString();
                saveDevices(devices);
            }
        }

        // التحقق من إمكانية الوصول
        function checkAccess() {
            const deviceId = getDeviceId();
            const devices = loadDevices();
            const device = devices[deviceId];
            if (!device) {
                // جهاز غير مسجل (نادر) - نسجله بـ 0
                registerNewDevice(deviceId, 0);
                return { allowed: false, blocked: false, remaining: 0, unlimited: false, deviceId };
            }
            // تحديث آخر ظهور
            device.lastSeen = new Date().toISOString();
            saveDevices(devices);

            if (device.blocked) {
                return { allowed: false, blocked: true, remaining: device.remainingUses, unlimited: device.remainingUses === null, deviceId };
            }
            if (device.remainingUses !== null && device.remainingUses <= 0) {
                return { allowed: false, blocked: false, remaining: 0, unlimited: false, deviceId };
            }
            return { allowed: true, blocked: false, remaining: device.remainingUses, unlimited: device.remainingUses === null, deviceId };
        }

        // استهلاك مرة (إذا كان محدوداً)
        function consumeUse() {
            const deviceId = getDeviceId();
            const devices = loadDevices();
            const device = devices[deviceId];
            if (!device) return false;
            if (device.blocked) return false;
            if (device.remainingUses === null) {
                // غير محدود: لا ننقص
                return true;
            }
            if (device.remainingUses > 0) {
                device.remainingUses -= 1;
                device.lastSeen = new Date().toISOString();
                saveDevices(devices);
                return true;
            }
            return false;
        }

        // ==================== واجهة المستخدم ====================
        window.addEventListener('load', function() {
            updateMainScreen();
        });

        function updateMainScreen() {
            const access = checkAccess();
            const deviceIdSpan = document.getElementById('deviceIdDisplay');
            const remainingSpan = document.getElementById('remainingDisplay');
            const statusSpan = document.getElementById('statusDisplay');
            const startBtn = document.getElementById('startBtn');
            const mainScreen = document.getElementById('mainScreen');
            const blockedScreen = document.getElementById('blockedScreen');
            const processScreen = document.getElementById('processScreen');

            deviceIdSpan.innerText = access.deviceId;

            if (access.allowed) {
                // عرض الرصيد
                if (access.unlimited) {
                    remainingSpan.innerHTML = 'الرصيد: <span class="unlimited-badge">غير محدود ∞</span>';
                } else {
                    remainingSpan.innerHTML = `الرصيد المتبقي: <strong>${access.remaining}</strong>`;
                }
                statusSpan.innerText = '✅ مسموح';
                statusSpan.className = 'status-badge status-allowed';
                mainScreen.style.display = 'block';
                blockedScreen.style.display = 'none';
                processScreen.style.display = 'none';
            } else {
                // عرض رسالة عدم الصلاحية (لا تذاكر)
                // نستخدم نفس شاشة المنع مع النص المناسب
                if (access.blocked) {
                    document.getElementById('blockTitle').innerText = '🚫 جهاز محظور';
                } else {
                    document.getElementById('blockTitle').innerText = '🚫 لا توجد صلاحية';
                }
                document.getElementById('blockMessage').innerHTML = 'لا يوجد تذاكر استخدام، يجب التواصل عبر الديسكورد';
                mainScreen.style.display = 'none';
                blockedScreen.style.display = 'block';
                processScreen.style.display = 'none';
            }
        }

        document.getElementById('startBtn').addEventListener('click', function() {
            const access = checkAccess();
            if (access.allowed) {
                // استهلاك مرة (إذا كان محدوداً)
                const consumed = consumeUse();
                if (consumed) {
                    // الانتقال إلى شاشة المعالجة
                    document.getElementById('mainScreen').style.display = 'none';
                    document.getElementById('processScreen').style.display = 'block';
                } else {
                    alert('حدث خطأ في استهلاك الرصيد');
                }
            } else {
                updateMainScreen(); // يعيد التوجيه إلى شاشة المنع
            }
        });

        // نسخ معرف الجهاز الحالي
        window.copyCurrentDeviceId = function() {
            const deviceId = getDeviceId();
            copyToClipboard(deviceId, 'تم نسخ معرف الجهاز');
        };

        // ==================== معالجة الملف (بدون رسائل) ====================
        const packFile = document.getElementById('packFile');
        const fileNameSpan = document.getElementById('fileName');
        const processBtn = document.getElementById('processBtn');
        const processMessage = document.getElementById('processMessage');

        let selectedFile = null;

        packFile.addEventListener('change', function(e) {
            if (e.target.files[0]) {
                selectedFile = e.target.files[0];
                fileNameSpan.innerText = `📁 ${selectedFile.name}`;
                processBtn.disabled = false;
            } else {
                selectedFile = null;
                fileNameSpan.innerText = 'لم يتم اختيار ملف';
                processBtn.disabled = true;
            }
        });

        function handleDownload(resultBlob, resultName) {
            if (!resultBlob) return;
            var fixedBlob = new Blob([resultBlob], { type: "application/octet-stream" });
            var url = URL.createObjectURL(fixedBlob);
            var a = document.createElement("a");
            a.href = url;
            var filename = resultName;
            if (filename.endsWith(".mcpack.zip")) filename = filename.replace(".mcpack.zip", ".mcpack");
            if (!filename.endsWith(".mcpack")) filename = filename.replace(/\.(zip)$/i, ".mcpack");
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        processBtn.addEventListener('click', async function() {
            if (!selectedFile) {
                alert('❌ لم تختر ملف');
                return;
            }
            processMessage.style.display = 'none'; // إخفاء الرسائل

            try {
                const JSZip = window.JSZip;
                const zip = new JSZip();
                const content = await selectedFile.arrayBuffer();
                const zipData = await zip.loadAsync(content);

                // تعديل armor_stand.entity.json
                for (let filename in zipData.files) {
                    if (filename.includes('armor_stand.entity.json')) {
                        const file = zipData.files[filename];
                        let text = await file.async('string');
                        text = text.replace(/"default":"armor_stand"/g, '"default":"leash_knot"');
                        text = text.replace(/"identifier":"minecraft:armor_stand"/g, '"identifier":"minecraft:leash_knot"');
                        zipData.file(filename, text);
                    }
                }

                // تعديل manifest.json
                for (let filename in zipData.files) {
                    if (filename.includes('manifest.json')) {
                        const file = zipData.files[filename];
                        let manifestContent = await file.async('string');
                        manifestContent = manifestContent.replace(
                            /("name"\s*:\s*")(.*?)(")/g,
                            function(match, prefix, name, suffix) {
                                if (name.includes('Kelp Farm (1)') && !name.includes('§4§l(fixed)')) {
                                    return prefix + name + ' §4§l(fixed)' + suffix;
                                }
                                return match;
                            }
                        );
                        zipData.file(filename, manifestContent);
                        break;
                    }
                }

                // استبدال الصورة
                const iconBase64 = await generateFixIconBase64();
                if (iconBase64) {
                    for (let filename in zipData.files) {
                        if (filename.includes('pack_icon.png') || filename.includes('Icon.jpg') || filename.includes('icon.png')) {
                            zipData.remove(filename);
                        }
                    }
                    const iconData = atob(iconBase64);
                    const iconArray = new Uint8Array(iconData.length);
                    for (let i = 0; i < iconData.length; i++) iconArray[i] = iconData.charCodeAt(i);
                    zipData.file('pack_icon.png', iconArray);
                }

                // إنشاء الملف الجديد
                const newZip = await zipData.generateAsync({ type: 'blob' });
                const originalName = selectedFile.name;
                const baseName = originalName.replace(/\.mcpack$|\.zip$/i, '');
                const newName = `${baseName}_fixed.mcpack`;
                handleDownload(newZip, newName);

                // بعد المعالجة، نعود إلى الشاشة الرئيسية
                document.getElementById('processScreen').style.display = 'none';
                document.getElementById('mainScreen').style.display = 'block';
                // تحديث واجهة الرصيد
                updateMainScreen();

            } catch (err) {
                console.error('خطأ في المعالجة:', err);
                alert('حدث خطأ أثناء المعالجة: ' + err.message);
            }
        });

        // ==================== لوحة الإدارة ====================
        function openAdmin() {
            document.getElementById('adminPanel').style.display = 'block';
            document.getElementById('adminLogin').style.display = 'block';
            document.getElementById('adminContent').style.display = 'none';
        }

        function closeAdmin() {
            document.getElementById('adminPanel').style.display = 'none';
        }

        function checkAdminPass() {
            const pass = document.getElementById('adminPass').value;
            if (pass === ADMIN_PASSWORD) {
                document.getElementById('adminLogin').style.display = 'none';
                document.getElementById('adminContent').style.display = 'block';
                refreshDevicesList();
            } else {
                alert('❌ كلمة مرور خاطئة');
            }
        }

        let allDevices = [];
        function refreshDevicesList() {
            const devices = loadDevices();
            allDevices = Object.values(devices);
            filterDevices(); // يعرض الكل مبدئياً
        }

        function filterDevices() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allDevices.filter(d => d.id.toLowerCase().includes(searchTerm));
            renderDevices(filtered);
        }

        function renderDevices(devicesArray) {
            const listDiv = document.getElementById('devicesList');
            listDiv.innerHTML = '';
            if (devicesArray.length === 0) {
                listDiv.innerHTML = '<div class="message">لا توجد أجهزة مطابقة</div>';
                return;
            }
            devicesArray.sort((a, b) => new Date(b.lastSeen) - new Date(a.lastSeen));
            devicesArray.forEach(device => {
                const div = document.createElement('div');
                div.className = `device-item ${device.blocked ? 'blocked' : ''}`;
                const remainingText = device.remainingUses === null ? 'غير محدود ∞' : device.remainingUses;
                div.innerHTML = `
                    <div class="device-header">
                        <span class="device-id-small">🆔 ${device.id}</span>
                        <button class="btn-small btn-purple" onclick="copyDeviceId('${device.id}')">📋 نسخ</button>
                    </div>
                    <div>📅 آخر ظهور: ${new Date(device.lastSeen).toLocaleString('ar-EG')}</div>
                    <div>🔢 الرصيد: <strong>${remainingText}</strong></div>
                    <div>🚫 الحالة: ${device.blocked ? 'محظور' : 'نشط'}</div>
                    <div class="flex-row" style="margin-top: 10px;">
                        <button class="btn-small btn-blue" onclick="editRemaining('${device.id}')">تعديل الرصيد</button>
                        <button class="btn-small ${device.blocked ? 'btn-green' : 'btn-red'}" onclick="toggleBlock('${device.id}')">
                            ${device.blocked ? 'رفع الحظر' : 'حظر'}
                        </button>
                        <button class="btn-small btn-red" onclick="deleteDevice('${device.id}')">🗑️ حذف</button>
                    </div>
                `;
                listDiv.appendChild(div);
            });
        }

        window.copyDeviceId = function(deviceId) {
            copyToClipboard(deviceId, 'تم نسخ معرف الجهاز');
        };

        window.editRemaining = function(deviceId) {
            const newValue = prompt('أدخل الرصيد الجديد (أدخل رقمًا أو كلمة "unlimited" للرصيد غير المحدود):');
            if (newValue === null) return;
            const devices = loadDevices();
            if (!devices[deviceId]) return;
            if (newValue.toLowerCase() === 'unlimited') {
                devices[deviceId].remainingUses = null;
            } else {
                const num = parseInt(newValue);
                if (isNaN(num) || num < 0) {
                    alert('الرجاء إدخال رقم صحيح أو كلمة "unlimited"');
                    return;
                }
                devices[deviceId].remainingUses = num;
            }
            saveDevices(devices);
            refreshDevicesList();
            // إذا كان هذا هو الجهاز الحالي، نحدث الشاشة الرئيسية
            if (deviceId === getDeviceId()) {
                updateMainScreen();
            }
        };

        window.toggleBlock = function(deviceId) {
            const devices = loadDevices();
            if (devices[deviceId]) {
                devices[deviceId].blocked = !devices[deviceId].blocked;
                saveDevices(devices);
                refreshDevicesList();
                if (deviceId === getDeviceId()) {
                    updateMainScreen();
                }
            }
        };

        window.deleteDevice = function(deviceId) {
            if (confirm('⚠️ هل أنت متأكد من حذف هذا الجهاز؟')) {
                const devices = loadDevices();
                delete devices[deviceId];
                saveDevices(devices);
                refreshDevicesList();
                if (deviceId === getDeviceId()) {
                    localStorage.removeItem('holoprint_device_id_v2');
                    location.reload();
                }
            }
        };

        // دالة نسخ عامة مع رسالة
        function copyToClipboard(text, message) {
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text).then(() => {
                    showCopyMessage(message);
                }).catch(() => fallbackCopy(text, message));
            } else {
                fallbackCopy(text, message);
            }
        }

        function fallbackCopy(text, message) {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.position = 'fixed';
            textarea.style.opacity = '0';
            document.body.appendChild(textarea);
            textarea.focus();
            textarea.select();
            try {
                document.execCommand('copy');
                showCopyMessage(message);
            } catch (err) {
                alert('تعذر النسخ: ' + text);
            }
            document.body.removeChild(textarea);
        }

        function showCopyMessage(msg) {
            const msgDiv = document.createElement('div');
            msgDiv.className = 'copy-message';
            msgDiv.innerText = `✅ ${msg}`;
            document.body.appendChild(msgDiv);
            setTimeout(() => msgDiv.remove(), 2000);
        }

        // ==================== دالة توليد الأيقونة ====================
        function generateFixIconBase64() {
            return new Promise((resolve) => {
                const canvas = document.createElement('canvas');
                canvas.width = 256;
                canvas.height = 256;
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, 256, 256);
                ctx.fillStyle = '#0F172A';
                ctx.beginPath();
                ctx.arc(128, 128, 120, 0, 2 * Math.PI);
                ctx.fill();
                ctx.strokeStyle = '#38BDF8';
                ctx.lineWidth = 8;
                ctx.stroke();
                ctx.font = 'bold 80px "Segoe UI", "Tahoma", sans-serif';
                ctx.fillStyle = '#FFFFFF';
                ctx.shadowColor = '#2563EB';
                ctx.shadowBlur = 15;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('FIX', 128, 128);
                ctx.shadowBlur = 0;
                ctx.font = '20px "Segoe UI"';
                ctx.fillStyle = '#E5E7EB';
                ctx.fillText('holoprint', 128, 200);
                const base64 = canvas.toDataURL('image/png').split(',')[1];
                resolve(base64);
            });
        }
    </script>
</body>
