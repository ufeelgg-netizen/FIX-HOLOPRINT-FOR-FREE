<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>FIX HOLOPRINT · معالج الملفات</title>
    <!-- أيقونة الموقع -->
    <link rel="icon" type="image/png" href="https://image2url.com/r2/default/images/1773163753711-12a6b929-9d7b-412f-bfde-a12c7d98698d.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: #0F172A;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px;
            margin: 0;
            direction: rtl;
            position: relative;
            overflow-x: hidden;
        }
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(circle at 30% 40%, rgba(56, 189, 248, 0.1) 0%, transparent 30%),
                              radial-gradient(circle at 70% 80%, rgba(37, 99, 235, 0.1) 0%, transparent 30%),
                              repeating-linear-gradient(45deg, rgba(255,255,255,0.02) 0px, rgba(255,255,255,0.02) 2px, transparent 2px, transparent 8px);
            pointer-events: none;
            z-index: 0;
        }
        .container {
            width: 100%;
            max-width: 560px;
            margin: 15px auto;
            position: relative;
            z-index: 1;
        }
        .card {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(12px);
            border: 1px solid #2563EB;
            border-radius: 45px;
            padding: 30px 20px;
            margin-bottom: 20px;
            box-shadow: 0 25px 45px -10px rgba(37, 99, 235, 0.4),
                        0 0 0 1px rgba(56, 189, 248, 0.2) inset;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            text-align: center;
        }
        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 30px 55px -8px #2563EB, 0 0 0 2px #38BDF8 inset;
        }
        .logo h1 {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #2563EB, #38BDF8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }
        .file-area {
            background: #1E293B;
            border-radius: 30px;
            padding: 18px;
            border: 2px dashed #2563EB;
            margin: 15px 0;
            text-align: center;
        }
        .file-label {
            background: #2563EB;
            padding: 16px 25px;
            border-radius: 50px;
            color: white;
            font-weight: 600;
            display: inline-block;
            cursor: pointer;
            border: 1px solid #38BDF8;
            width: 100%;
            transition: 0.2s;
        }
        .file-label:hover {
            background: #1e4bb3;
        }
        .badge {
            background: #1E293B;
            color: #E5E7EB;
            padding: 12px 16px;
            border-radius: 50px;
            font-size: 1rem;
            margin: 10px 0;
            word-break: break-word;
            border: 1px solid #38BDF8;
        }
        .btn-primary {
            width: 100%;
            background: #2563EB;
            border: none;
            color: white;
            font-weight: bold;
            padding: 18px 20px;
            border-radius: 60px;
            font-size: 1.3rem;
            cursor: pointer;
            border-bottom: 4px solid #1e4bb3;
            box-shadow: 0 8px 15px rgba(37, 99, 235, 0.5);
            margin: 10px 0;
            transition: all 0.2s;
        }
        .btn-primary:hover:not(:disabled) {
            background: #1e4bb3;
            transform: translateY(-2px);
        }
        .btn-primary:active:not(:disabled) { transform: translateY(2px); border-bottom-width: 2px; }
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            background: #475569;
            border-bottom-color: #1E293B;
        }
        
        /* Discord button - small and 3D */
        .discord-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: #5865F2;
            padding: 12px 24px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            text-decoration: none;
            font-size: 1.1rem;
            margin: 15px 0 10px;
            border-bottom: 4px solid #4752C4;
            box-shadow: 0 8px 15px rgba(88, 101, 242, 0.4);
            transition: all 0.2s ease;
            width: auto;
            min-width: 140px;
        }
        
        .discord-button:hover {
            background: #4752C4;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(88, 101, 242, 0.6);
        }
        
        .discord-button:active {
            transform: translateY(2px);
            border-bottom-width: 2px;
        }
        
        .discord-icon {
            width: 24px;
            height: 24px;
            margin-left: 10px;
            filter: drop-shadow(0 2px 2px rgba(0,0,0,0.2));
        }
        
        footer {
            text-align: center;
            color: #94A3B8;
            margin-top: 15px;
            font-size: 0.9rem;
        }
        
        .message {
            background: #1E293B;
            padding: 18px;
            border-radius: 30px;
            margin-top: 15px;
            color: #E5E7EB;
            border: 1px solid #2563EB;
            white-space: pre-line;
            display: none;
        }
        
        /* Center the discord button */
        .discord-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="logo">
                <h1>🔧 FIX HOLOPRINT</h1>
            </div>
            <p style="color: #E5E7EB; margin-bottom: 20px;">أداة معالجة ملفات الهولوبرنت</p>

            <div class="file-area">
                <input type="file" id="packFile" accept=".mcpack,.zip" style="display: none;">
                <button class="file-label" onclick="document.getElementById('packFile').click()">📦 اختيار ملف .mcpack أو .zip</button>
                <div id="fileName" class="badge">لم يتم اختيار ملف</div>
            </div>
            <button class="btn-primary" id="processBtn" disabled>🔧 معالجة وإصلاح الملف</button>
            <div id="processMessage" class="message"></div>

            <!-- Discord button - small and 3D with only "Discord" text -->
            <div class="discord-wrapper">
                <a href="https://discord.gg/cqQvSshdt" target="_blank" class="discord-button">
                    <svg class="discord-icon" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                        <path d="M19.27 5.33C17.94 4.71 16.5 4.26 15 4a.09.09 0 0 0-.07.03c-.18.33-.39.76-.53 1.09a16.09 16.09 0 0 0-4.8 0c-.14-.34-.35-.76-.54-1.09c-.01-.02-.04-.03-.07-.03c-1.5.26-2.93.71-4.27 1.33c-.01 0-.02.01-.03.02c-2.72 4.07-3.47 8.03-3.1 11.95c0 .02.01.04.03.05c1.8 1.32 3.53 2.12 5.23 2.65c.03.01.06 0 .07-.02c.4-.55.76-1.13 1.07-1.74c.02-.04 0-.08-.04-.09c-.57-.22-1.11-.48-1.64-.78c-.04-.02-.04-.08-.01-.11c.11-.08.22-.17.33-.25c.02-.02.05-.02.07-.01c3.44 1.57 7.15 1.57 10.55 0c.02-.01.05-.01.07.01c.11.09.22.17.33.26c.03.02.03.08-.01.11c-.52.31-1.07.56-1.64.78c-.04.01-.05.06-.04.09c.32.61.68 1.19 1.07 1.74c.03.01.06.02.09.01c1.72-.53 3.45-1.33 5.25-2.65c.02-.01.03-.03.03-.05c.44-4.53-.73-8.46-3.1-11.95c-.01-.01-.02-.02-.04-.02zM8.52 14.91c-1.03 0-1.89-.95-1.89-2.12s.84-2.12 1.89-2.12c1.06 0 1.9.96 1.89 2.12c0 1.17-.84 2.12-1.89 2.12zm6.97 0c-1.03 0-1.89-.95-1.89-2.12s.84-2.12 1.89-2.12c1.06 0 1.9.96 1.89 2.12c0 1.17-.83 2.12-1.89 2.12z"/>
                    </svg>
                    Discord
                </a>
            </div>
            
            <footer>تم التطوير بواسطة @hurleyxyz · الإصدار البسيط</footer>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script>
        // ==================== دالة توليد الأيقونة ====================
        function generateFixIconBase64() {
            return new Promise((resolve) => {
                const canvas = document.createElement('canvas');
                canvas.width = 256;
                canvas.height = 256;
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, 256, 256);
                ctx.fillStyle = '#0F172A';
                ctx.beginPath();
                ctx.arc(128, 128, 120, 0, 2 * Math.PI);
                ctx.fill();
                ctx.strokeStyle = '#38BDF8';
                ctx.lineWidth = 8;
                ctx.stroke();
                ctx.font = 'bold 80px "Segoe UI", "Tahoma", sans-serif';
                ctx.fillStyle = '#FFFFFF';
                ctx.shadowColor = '#2563EB';
                ctx.shadowBlur = 15;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('FIX', 128, 128);
                ctx.shadowBlur = 0;
                ctx.font = '20px "Segoe UI"';
                ctx.fillStyle = '#E5E7EB';
                ctx.fillText('holoprint', 128, 200);
                const base64 = canvas.toDataURL('image/png').split(',')[1];
                resolve(base64);
            });
        }

        // ==================== عناصر الصفحة ====================
        const packFile = document.getElementById('packFile');
        const fileNameSpan = document.getElementById('fileName');
        const processBtn = document.getElementById('processBtn');
        const processMessage = document.getElementById('processMessage');

        let selectedFile = null;

        packFile.addEventListener('change', function(e) {
            if (e.target.files[0]) {
                selectedFile = e.target.files[0];
                fileNameSpan.innerText = `📁 ${selectedFile.name}`;
                processBtn.disabled = false;
            } else {
                selectedFile = null;
                fileNameSpan.innerText = 'لم يتم اختيار ملف';
                processBtn.disabled = true;
            }
        });

        // دالة التحميل
        function handleDownload(resultBlob, resultName) {
            if (!resultBlob) return;
            var fixedBlob = new Blob([resultBlob], { type: "application/octet-stream" });
            var url = URL.createObjectURL(fixedBlob);
            var a = document.createElement("a");
            a.href = url;
            var filename = resultName;
            if (filename.endsWith(".mcpack.zip")) filename = filename.replace(".mcpack.zip", ".mcpack");
            if (!filename.endsWith(".mcpack")) filename = filename.replace(/\.(zip)$/i, ".mcpack");
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        // معالجة الملف
        processBtn.addEventListener('click', async function() {
            if (!selectedFile) {
                alert('❌ لم تختر ملف');
                return;
            }
            processMessage.style.display = 'none';

            try {
                const JSZip = window.JSZip;
                const zip = new JSZip();
                const content = await selectedFile.arrayBuffer();
                const zipData = await zip.loadAsync(content);

                // تعديل armor_stand.entity.json
                for (let filename in zipData.files) {
                    if (filename.includes('armor_stand.entity.json')) {
                        const file = zipData.files[filename];
                        let text = await file.async('string');
                        text = text.replace(/"default":"armor_stand"/g, '"default":"leash_knot"');
                        text = text.replace(/"identifier":"minecraft:armor_stand"/g, '"identifier":"minecraft:leash_knot"');
                        zipData.file(filename, text);
                    }
                }

                // تعديل manifest.json
                for (let filename in zipData.files) {
                    if (filename.includes('manifest.json')) {
                        const file = zipData.files[filename];
                        let manifestContent = await file.async('string');
                        manifestContent = manifestContent.replace(
                            /("name"\s*:\s*")(.*?)(")/g,
                            function(match, prefix, name, suffix) {
                                if (name.includes('Kelp Farm (1)') && !name.includes('§4§l(fixed)')) {
                                    return prefix + name + ' §4§l(fixed)' + suffix;
                                }
                                return match;
                            }
                        );
                        zipData.file(filename, manifestContent);
                        break;
                    }
                }

                // استبدال الصورة
                const iconBase64 = await generateFixIconBase64();
                if (iconBase64) {
                    for (let filename in zipData.files) {
                        if (filename.includes('pack_icon.png') || filename.includes('Icon.jpg') || filename.includes('icon.png')) {
                            zipData.remove(filename);
                        }
                    }
                    const iconData = atob(iconBase64);
                    const iconArray = new Uint8Array(iconData.length);
                    for (let i = 0; i < iconData.length; i++) iconArray[i] = iconData.charCodeAt(i);
                    zipData.file('pack_icon.png', iconArray);
                }

                // إنشاء الملف الجديد
                const newZip = await zipData.generateAsync({ type: 'blob' });
                const originalName = selectedFile.name;
                const baseName = originalName.replace(/\.mcpack$|\.zip$/i, '');
                const newName = `${baseName}_fixed.mcpack`;
                handleDownload(newZip, newName);

            } catch (err) {
                console.error('خطأ في المعالجة:', err);
                alert('حدث خطأ أثناء المعالجة: ' + err.message);
            }
        });
    </script>
</body>
</html>
