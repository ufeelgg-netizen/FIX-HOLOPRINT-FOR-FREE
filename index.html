<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>FIX HOLOPRINT</title>
    <!-- تم تغيير الأيقونة إلى الرابط الجديد -->
    <link rel="icon" type="image/png" href="https://image2url.com/r2/default/images/1773163753711-12a6b929-9d7b-412f-bfde-a12c7d98698d.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: #0F172A;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 12px;
            margin: 0;
            direction: rtl;
        }
        .container {
            width: 100%;
            max-width: 560px;
            margin: 15px auto;
        }
        .card {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid #2563EB;
            border-radius: 35px;
            padding: 22px 18px;
            margin-bottom: 18px;
            box-shadow: 0 20px 40px rgba(37, 99, 235, 0.3);
        }
        .header {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 8px;
        }
        .logo h1 {
            font-size: 1.7rem;
            font-weight: 800;
            background: linear-gradient(135deg, #2563EB, #38BDF8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .btn-admin {
            background: #2563EB;
            border: 1px solid #38BDF8;
            color: white;
            padding: 10px 18px;
            border-radius: 50px;
            font-weight: 700;
            cursor: pointer;
            border-bottom: 3px solid #1e4bb3;
            box-shadow: 0 5px 10px rgba(37, 99, 235, 0.5);
            transition: all 0.2s;
        }
        .btn-admin:hover {
            background: #1e4bb3;
            transform: translateY(-1px);
        }
        .btn-admin:active { transform: translateY(2px); border-bottom-width: 1px; }
        .lock-icon { font-size: 2rem; text-align: center; margin-bottom: 10px; }
        .code-input {
            width: 100%;
            background: #1E293B;
            border: 2px solid #2563EB;
            padding: 18px 20px;
            border-radius: 60px;
            font-size: 1.2rem;
            color: white;
            text-align: center;
            letter-spacing: 3px;
            outline: none;
            margin: 15px 0;
        }
        .code-input::placeholder { color: #94A3B8; letter-spacing: normal; }
        .btn-primary {
            width: 100%;
            background: #2563EB;
            border: none;
            color: white;
            font-weight: bold;
            padding: 18px 20px;
            border-radius: 60px;
            font-size: 1.3rem;
            cursor: pointer;
            border-bottom: 4px solid #1e4bb3;
            box-shadow: 0 8px 15px rgba(37, 99, 235, 0.5);
            margin: 10px 0;
            transition: all 0.2s;
        }
        .btn-primary:hover:not(:disabled) {
            background: #1e4bb3;
            transform: translateY(-2px);
        }
        .btn-primary:active:not(:disabled) { transform: translateY(2px); border-bottom-width: 2px; }
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            background: #475569;
            border-bottom-color: #1E293B;
        }
        .file-area {
            background: #1E293B;
            border-radius: 30px;
            padding: 18px;
            border: 2px dashed #2563EB;
            margin: 15px 0;
            text-align: center;
        }
        .file-label {
            background: #2563EB;
            padding: 16px 25px;
            border-radius: 50px;
            color: white;
            font-weight: 600;
            display: inline-block;
            cursor: pointer;
            border: 1px solid #38BDF8;
            width: 100%;
            transition: 0.2s;
        }
        .file-label:hover {
            background: #1e4bb3;
        }
        .badge {
            background: #1E293B;
            color: #E5E7EB;
            padding: 12px 16px;
            border-radius: 50px;
            font-size: 1rem;
            margin: 10px 0;
            word-break: break-word;
            border: 1px solid #38BDF8;
        }
        .message {
            background: #1E293B;
            padding: 18px;
            border-radius: 30px;
            margin-top: 15px;
            color: #E5E7EB;
            border: 1px solid #2563EB;
            white-space: pre-line;
        }
        .discord-link {
            display: block;
            background: #5865F2;
            padding: 16px 20px;
            border-radius: 60px;
            color: white;
            font-weight: bold;
            text-decoration: none;
            text-align: center;
            font-size: 1.2rem;
            margin: 15px 0;
        }
        footer { text-align: center; color: #94A3B8; margin-top: 15px; }
        
        .admin-panel {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            overflow-y: auto;
            padding: 20px;
        }
        .admin-content {
            background: #0F172A;
            border-radius: 40px;
            padding: 25px 20px;
            border: 1px solid #2563EB;
            margin: 20px auto;
            max-width: 600px;
        }
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }
        .btn-close {
            background: #2563EB;
            color: white;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 1.8rem;
            cursor: pointer;
        }
        .code-item {
            background: #1E293B;
            border-radius: 30px;
            padding: 18px;
            margin-bottom: 15px;
            border: 1px solid #38BDF8;
        }
        .btn-small {
            padding: 10px 18px;
            border-radius: 40px;
            border: none;
            font-weight: 600;
            margin: 5px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            transition: 0.2s;
        }
        .btn-green { background: #10b981; color: white; }
        .btn-red { background: #ef4444; color: white; }
        .btn-blue { background: #2563EB; color: white; }
        .btn-purple { background: #8b5cf6; color: white; }
        .input-admin {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border-radius: 40px;
            border: none;
            background: #1E293B;
            color: white;
            border: 1px solid #2563EB;
        }
        .flex-row { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .permanent-lock {
            text-align: center;
            padding: 30px;
            background: #1E293B;
            border-radius: 40px;
            border: 2px solid #2563EB;
        }
        .permanent-lock h2 { color: #38BDF8; font-size: 2rem; margin-bottom: 20px; }
        .permanent-lock p { color: #E5E7EB; }
        .copy-message {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #10b981;
            color: white;
            padding: 12px 25px;
            border-radius: 50px;
            z-index: 2000;
            animation: fadeInOut 2s ease;
        }
        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateX(-50%) translateY(20px); }
            15% { opacity: 1; transform: translateX(-50%) translateY(0); }
            85% { opacity: 1; }
            100% { opacity: 0; transform: translateX(-50%) translateY(-20px); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <div class="logo">
                    <h1>🔧 FIX HOLOPRINT</h1>
                </div>
                <button class="btn-admin" onclick="openAdmin()">👑 لوحة الإدارة</button>
            </div>

            <div id="lockScreen">
                <div class="lock-icon">🔒</div>
                <input type="text" id="codeInput" class="code-input" placeholder="XXXX-XXXX-XXXX" maxlength="15">
                <button class="btn-primary" id="unlockBtn">فتح القفل</button>
                <div id="unlockMessage" class="message" style="display: none;"></div>
            </div>

            <div id="permanentLockScreen" style="display: none;">
                <div class="permanent-lock">
                    <h2>🔒 مغلق نهائياً</h2>
                    <p>هذا الكود استخدم وانتهى</p>
                    <p>لا يمكن استخدامه مرة أخرى</p>
                    <div style="margin-top: 30px; font-size: 3rem;">🚫</div>
                </div>
            </div>

            <div id="processScreen" style="display: none;">
                <div class="file-area">
                    <input type="file" id="packFile" accept=".mcpack,.zip" style="display: none;">
                    <button class="file-label" onclick="document.getElementById('packFile').click()">📦 اختيار ملف .mcpack أو .zip</button>
                    <div id="fileName" class="badge">لم يتم اختيار ملف</div>
                </div>
                <button class="btn-primary" id="processBtn" disabled>🔧 معالجة وإصلاح الملف</button>
                <div id="processMessage" class="message"></div>
            </div>

            <a href="https://discord.gg/cqQvSshdt" target="_blank" class="discord-link">💬 دعم فني عبر Discord</a>
            <footer>تم التطوير بواسطة @hurleyxyz · الإصدار 1.0</footer>
        </div>
    </div>

    <div id="adminPanel" class="admin-panel">
        <div class="admin-content">
            <div class="admin-header">
                <h2 style="color: #38BDF8;">👑 لوحة التحكم</h2>
                <button class="btn-close" onclick="closeAdmin()">×</button>
            </div>
            <div id="adminLogin">
                <input type="password" id="adminPass" class="input-admin" placeholder="كلمة المرور">
                <button class="btn-primary" onclick="checkAdminPass()">دخول</button>
            </div>
            <div id="adminContent" style="display: none;">
                <div style="margin: 20px 0;">
                    <h3 style="color: #38BDF8; margin-bottom: 15px;">➕ إنشاء كود جديد</h3>
                    <input type="text" id="newCode" class="input-admin" placeholder="الكود (مثال: XXXX-XXXX-XXXX)">
                    <select id="codeType" class="input-admin">
                        <option value="unlimited">غير محدود</option>
                        <option value="limited">محدود</option>
                    </select>
                    <input type="number" id="usesCount" class="input-admin" placeholder="عدد الاستخدامات (للمحدود فقط)" value="5" min="1">
                    <button class="btn-primary" onclick="createCode()">إنشاء الكود</button>
                </div>
                <div style="margin: 20px 0;">
                    <h3 style="color: #38BDF8; margin-bottom: 15px;">📋 قائمة الأكواد</h3>
                    <div id="codesList"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script>
        const ADMIN_PASSWORD = '3alloch';
        const STORAGE_KEY = 'holoprint_device_id';
        const CODES_KEY = 'holoprint_codes';
        const LOCKED_KEY = 'holoprint_permanent_lock';

        function generateFixIconBase64() {
            return new Promise((resolve) => {
                const canvas = document.createElement('canvas');
                canvas.width = 256;
                canvas.height = 256;
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, 256, 256);
                ctx.fillStyle = '#0F172A';
                ctx.beginPath();
                ctx.arc(128, 128, 120, 0, 2 * Math.PI);
                ctx.fill();
                ctx.strokeStyle = '#38BDF8';
                ctx.lineWidth = 8;
                ctx.stroke();
                ctx.font = 'bold 80px "Segoe UI", "Tahoma", sans-serif';
                ctx.fillStyle = '#FFFFFF';
                ctx.shadowColor = '#2563EB';
                ctx.shadowBlur = 15;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('FIX', 128, 128);
                ctx.shadowBlur = 0;
                ctx.font = '20px "Segoe UI"';
                ctx.fillStyle = '#E5E7EB';
                ctx.fillText('holoprint', 128, 200);
                const base64 = canvas.toDataURL('image/png').split(',')[1];
                resolve(base64);
            });
        }

        function getDeviceId() {
            let deviceId = localStorage.getItem(STORAGE_KEY);
            if (!deviceId) {
                deviceId = 'dev_' + Math.random().toString(36).substring(2) + Date.now().toString(36);
                localStorage.setItem(STORAGE_KEY, deviceId);
            }
            return deviceId;
        }

        function getDefaultCodes() {
            return [
                { code: 'ABCD-1234-5678', type: 'unlimited', usesLeft: null, active: true, deviceBound: null },
                { code: 'LIMIT-5TEST-0001', type: 'limited', usesLeft: 5, active: true, deviceBound: null },
                { code: 'ADMIN-3ALLOCH-XX', type: 'limited', usesLeft: 2, active: true, deviceBound: null },
                { code: 'SINGLE-USE-001', type: 'limited', usesLeft: 1, active: true, deviceBound: null }
            ];
        }

        function loadCodes() {
            const stored = localStorage.getItem(CODES_KEY);
            if (stored) {
                try { return JSON.parse(stored); } 
                catch { return getDefaultCodes(); }
            } else {
                localStorage.setItem(CODES_KEY, JSON.stringify(getDefaultCodes()));
                return getDefaultCodes();
            }
        }

        function saveCodes(codes) {
            localStorage.setItem(CODES_KEY, JSON.stringify(codes));
        }

        function isPermanentlyLocked() {
            return localStorage.getItem(LOCKED_KEY) === 'true';
        }

        function setPermanentLock() {
            localStorage.setItem(LOCKED_KEY, 'true');
        }

        function validateCode(inputCode) {
            if (isPermanentlyLocked()) {
                return { success: false, message: '🔒 هذا الكود استخدم وانتهى نهائياً', permanentLock: true };
            }
            const codes = loadCodes();
            const deviceId = getDeviceId();
            const normalizedInput = inputCode.trim().toUpperCase();
            const found = codes.find(c => c.code.toUpperCase() === normalizedInput && c.active === true);
            if (!found) return { success: false, message: '❌ كود غير صالح أو معطل' };
            if (found.deviceBound && found.deviceBound !== deviceId) {
                return { success: false, message: '⚠️ هذا الكود مقيد بجهاز آخر' };
            }
            if (!found.deviceBound) {
                found.deviceBound = deviceId;
                saveCodes(codes);
            }
            if (found.type === 'limited' && found.usesLeft <= 0) {
                return { success: false, message: '❌ انتهت استخدامات هذا الكود' };
            }
            return { success: true, codeObject: found, message: '✅ تم الفتح بنجاح' };
        }

        function consumeUse(codeObj) {
            if (codeObj.type === 'limited' && codeObj.usesLeft > 0) {
                codeObj.usesLeft -= 1;
                const wasLastUse = (codeObj.usesLeft === 0);
                const codes = loadCodes();
                const updated = codes.map(c => c.code === codeObj.code ? codeObj : c);
                saveCodes(updated);
                if (wasLastUse) {
                    setPermanentLock();
                    return true;
                }
            }
            return false;
        }

        let currentCode = null;

        window.addEventListener('load', function() {
            if (isPermanentlyLocked()) {
                document.getElementById('lockScreen').style.display = 'none';
                document.getElementById('permanentLockScreen').style.display = 'block';
            }
        });

        document.getElementById('unlockBtn').addEventListener('click', function() {
            const code = document.getElementById('codeInput').value;
            const result = validateCode(code);
            const msgDiv = document.getElementById('unlockMessage');
            msgDiv.style.display = 'block';
            msgDiv.innerText = result.message;
            if (result.success) {
                currentCode = result.codeObject;
                document.getElementById('lockScreen').style.display = 'none';
                document.getElementById('processScreen').style.display = 'block';
            } else if (result.permanentLock) {
                document.getElementById('lockScreen').style.display = 'none';
                document.getElementById('permanentLockScreen').style.display = 'block';
            }
        });

        // ==================== معالجة الملف ====================
        const packFile = document.getElementById('packFile');
        const fileNameSpan = document.getElementById('fileName');
        const processBtn = document.getElementById('processBtn');
        const processMessage = document.getElementById('processMessage');

        let selectedFile = null;

        packFile.addEventListener('change', function(e) {
            if (e.target.files[0]) {
                selectedFile = e.target.files[0];
                fileNameSpan.innerText = `📁 ${selectedFile.name}`;
                processBtn.disabled = false;
            } else {
                selectedFile = null;
                fileNameSpan.innerText = 'لم يتم اختيار ملف';
                processBtn.disabled = true;
            }
        });

        function handleDownload(resultBlob, resultName) {
            if (!resultBlob) return;
            var fixedBlob = new Blob([resultBlob], { type: "application/octet-stream" });
            var url = URL.createObjectURL(fixedBlob);
            var a = document.createElement("a");
            a.href = url;
            var filename = resultName;
            if (filename.endsWith(".mcpack.zip")) {
                filename = filename.replace(".mcpack.zip", ".mcpack");
            }
            if (!filename.endsWith(".mcpack")) {
                filename = filename.replace(/\.(zip)$/i, ".mcpack");
            }
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        processBtn.addEventListener('click', async function() {
            if (!currentCode) {
                alert('الرجاء فتح القفل أولاً');
                return;
            }
            if (!selectedFile) {
                processMessage.innerText = '❌ لم تختر ملف';
                return;
            }
            processMessage.innerText = '⏳ جاري المعالجة...';

            try {
                const JSZip = window.JSZip;
                const zip = new JSZip();
                const content = await selectedFile.arrayBuffer();
                const zipData = await zip.loadAsync(content);

                let changesMade = [];

                let modified = false;
                for (let filename in zipData.files) {
                    if (filename.includes('armor_stand.entity.json')) {
                        const file = zipData.files[filename];
                        let text = await file.async('string');
                        const originalText = text;

                        text = text.replace(/"default":"armor_stand"/g, '"default":"leash_knot"');
                        text = text.replace(/"identifier":"minecraft:armor_stand"/g, '"identifier":"minecraft:leash_knot"');

                        if (text !== originalText) {
                            zipData.file(filename, text);
                            modified = true;
   
                        }
                    }
                }

                if (!modified) {
                    changesMade.push('هنلك خلل في الملف ❌   ');
                }

                for (let filename in zipData.files) {
                    if (filename.includes('manifest.json')) {
                        const file = zipData.files[filename];
                        let manifestContent = await file.async('string');
                        const originalManifest = manifestContent;
                        manifestContent = manifestContent.replace(
                            /("name"\s*:\s*")(.*?)(")/g,
                            function(match, prefix, name, suffix) {
                                if (name.includes('Kelp Farm (1)') && !name.includes('§4§l(fixed)')) {
                                    return prefix + name + ' §4§l(fixed)' + suffix;
                                }
                                return match;
                            }
                        );
                        if (manifestContent !== originalManifest) {
                            zipData.file(filename, manifestContent);
                            changesMade.push('✅ تم تعديل manifest.json');
                        }
                        break;
                    }
                }

                processMessage.innerText = '⏳ جاري إنشاء صورة FIX...';
                const iconBase64 = await generateFixIconBase64();
                if (iconBase64) {
                    for (let filename in zipData.files) {
                        if (filename.includes('pack_icon.png') || filename.includes('Icon.jpg') || filename.includes('icon.png')) {
                            zipData.remove(filename);
                        }
                    }
                    const iconData = atob(iconBase64);
                    const iconArray = new Uint8Array(iconData.length);
                    for (let i = 0; i < iconData.length; i++) {
                        iconArray[i] = iconData.charCodeAt(i);
                    }
                    zipData.file('pack_icon.png', iconArray);
                    changesMade.push('✅ تم استبدال صورة الحزمة');
                }

                const newZip = await zipData.generateAsync({ type: 'blob' });
                const originalName = selectedFile.name;
                const baseName = originalName.replace(/\.mcpack$|\.zip$/i, '');
                let newName = `${baseName}_fixed.mcpack`;

                handleDownload(newZip, newName);

                const wasLastUse = consumeUse(currentCode);
                
                let resultMessage = changesMade.join('\n') + '\n\n';
                
                if (wasLastUse) {
                    resultMessage += '✅ تمت المعالجة! هذا كان آخر استخدام للكود. سيتم إغلاق الموقع.';
                    processMessage.innerText = resultMessage;
                    setTimeout(() => {
                        document.getElementById('processScreen').style.display = 'none';
                        document.getElementById('permanentLockScreen').style.display = 'block';
                    }, 5000);
                } else {
                    resultMessage += '✅ تمت المعالجة بنجاح! تم تحميل الملف المعدل.';
                    processMessage.innerText = resultMessage;
                }

            } catch (err) {
                console.error('خطأ في المعالجة:', err);
                processMessage.innerText = `❌ خطأ: ${err.message}\n\nتفاصيل إضافية في وحدة التحكم (F12 > Console)`;
            }
        });

        // ==================== لوحة الإدارة ====================
        function openAdmin() {
            document.getElementById('adminPanel').style.display = 'block';
            document.getElementById('adminLogin').style.display = 'block';
            document.getElementById('adminContent').style.display = 'none';
        }

        function closeAdmin() {
            document.getElementById('adminPanel').style.display = 'none';
        }

        function checkAdminPass() {
            const pass = document.getElementById('adminPass').value;
            if (pass === ADMIN_PASSWORD) {
                document.getElementById('adminLogin').style.display = 'none';
                document.getElementById('adminContent').style.display = 'block';
                refreshCodesList();
            } else {
                alert('❌ كلمة مرور خاطئة');
            }
        }

        function copyToClipboard(text) {
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text).then(() => {
                    showCopyMessage(text);
                }).catch(err => {
                    fallbackCopy(text);
                });
            } else {
                fallbackCopy(text);
            }
        }

        function fallbackCopy(text) {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.position = 'fixed';
            textarea.style.opacity = '0';
            document.body.appendChild(textarea);
            textarea.focus();
            textarea.select();
            try {
                document.execCommand('copy');
                showCopyMessage(text);
            } catch (err) {
                alert('تعذر النسخ، يمكنك نسخ النص يدويًا: ' + text);
            }
            document.body.removeChild(textarea);
        }

        function showCopyMessage(text) {
            const msgDiv = document.createElement('div');
            msgDiv.className = 'copy-message';
            msgDiv.innerText = `✅ تم نسخ: ${text}`;
            document.body.appendChild(msgDiv);
            setTimeout(() => msgDiv.remove(), 2000);
        }

        function refreshCodesList() {
            const codes = loadCodes();
            const listDiv = document.getElementById('codesList');
            listDiv.innerHTML = '';
            codes.forEach((code) => {
                const div = document.createElement('div');
                div.className = 'code-item';
                div.innerHTML = `
                    <div style="font-size: 1.2rem; color: #38BDF8; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center;">
                        <span>${code.code}</span>
                        <button class="btn-small btn-purple" onclick="copyToClipboard('${code.code}')" style="margin: 0;">📋 نسخ</button>
                    </div>
                    <div>النوع: ${code.type === 'unlimited' ? 'غير محدود' : 'محدود'}</div>
                    <div>الاستخدامات: ${code.usesLeft !== null ? code.usesLeft : '∞'}</div>
                    <div>الحالة: ${code.active ? '✅ نشط' : '❌ معطل'}</div>
                    <div>الجهاز: ${code.deviceBound ? 'مرتبط' : 'غير مرتبط'}</div>
                    <div class="flex-row" style="margin-top: 10px;">
                        <button class="btn-small btn-green" onclick="toggleCode('${code.code}')">${code.active ? 'تعطيل' : 'تفعيل'}</button>
                        ${code.type === 'limited' ? `<button class="btn-small btn-blue" onclick="resetUses('${code.code}')">إعادة تعيين</button>` : ''}
                        <button class="btn-small btn-red" onclick="deleteCode('${code.code}')">🗑️ حذف</button>
                    </div>
                `;
                listDiv.appendChild(div);
            });
        }

        function createCode() {
            const newCode = document.getElementById('newCode').value;
            const type = document.getElementById('codeType').value;
            const uses = document.getElementById('usesCount').value;
            if (!newCode) { alert('الرجاء إدخال الكود'); return; }
            const codes = loadCodes();
            if (codes.find(c => c.code === newCode)) { alert('هذا الكود موجود مسبقاً'); return; }
            codes.push({
                code: newCode,
                type: type,
                usesLeft: type === 'limited' ? parseInt(uses) : null,
                active: true,
                deviceBound: null
            });
            saveCodes(codes);
            refreshCodesList();
            document.getElementById('newCode').value = '';
            document.getElementById('usesCount').value = '5';
        }

        function toggleCode(codeStr) {
            if (confirm('تغيير حالة الكود؟')) {
                const codes = loadCodes();
                const code = codes.find(c => c.code === codeStr);
                if (code) { code.active = !code.active; saveCodes(codes); refreshCodesList(); }
            }
        }

        function resetUses(codeStr) {
            const newUses = prompt('أدخل عدد الاستخدامات الجديد:');
            if (newUses !== null) {
                const codes = loadCodes();
                const code = codes.find(c => c.code === codeStr);
                if (code && code.type === 'limited') {
                    code.usesLeft = parseInt(newUses);
                    saveCodes(codes);
                    refreshCodesList();
                }
            }
        }

        function deleteCode(codeStr) {
            if (confirm('⚠️ هل أنت متأكد من حذف هذا الكود؟')) {
                const codes = loadCodes();
                const newCodes = codes.filter(c => c.code !== codeStr);
                saveCodes(newCodes);
                refreshCodesList();
                alert('✅ تم حذف الكود بنجاح');
            }
        }
    </script>
</body>
</html>
